# ── Historial de entrenadores (SOLO HECHOS) ──────────────────────────────────
# Equipo + temporadas que cada tecnico dirigio, mapeado a los nombres reales de
# los equipos en team_seasons.parquet. NO contiene ninguna descripcion de estilo:
# el estilo se calcula 100% por codigo en src/profiling/coach_style.py agregando
# las metricas Opta de estos equipos-temporada.
#
# 'team_match' = subcadena que identifica al equipo en los datos (case-insensitive).
# Cobertura del dataset: temporadas 2021-2022 .. 2025-2026 (2025-2026 parcial).
# Fuentes del historial: Transfermarkt / BeSoccer / prensa deportiva (jun-2026).

meta:
  dataset_seasons: ["2021-2022", "2022-2023", "2023-2024", "2024-2025", "2025-2026"]
  note: >
    Solo se incluyen etapas cubiertas por las ligas del scope (LaLiga, Segunda,
    Ligue 1, Premier, Championship...). Etapas en ligas fuera del scope quedan
    sin datos y el perfil se marca como cobertura parcial.

