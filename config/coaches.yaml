# ── Casting de entrenadores — Rayo Vallecano 2026/27 ─────────────────────────
# Fuentes: Transfermarkt, ElGolDigital, UnionRayo, SportAragón, Wikipedia (jun-2026)
# Compatibilidad Rayo (1-10): presupuesto medio-bajo + estilo organizado + experiencia LaLiga

meta:
  season_target: "2026/2027"
  context: >
    Íñigo Pérez abandona el Rayo para fichar por el Villarreal (reemplaza a Marcelino).
    El Rayo busca un perfil de entrenador que mantenga solidez defensiva,
    pueda trabajar con presupuesto medio-bajo (~€35M masa salarial) y
    tenga experiencia en LaLiga o nivel equivalente.
    Perfil Íñigo Pérez: 4-2-3-1 / 4-4-2, bloque medio-alto, presión en zonas medias,
    buen trabajo con jóvenes, perfil comunicador.

